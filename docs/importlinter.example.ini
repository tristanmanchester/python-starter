; Example only. Rename to `.importlinter` once your package structure stabilises.
;
; Purpose:
; - keep layers clean
; - stop accidental imports across boundaries
; - preserve agent-friendly navigation as the repo grows

[importlinter]
root_package = agent_ready_python_starter

; Example layered contract:
; [importlinter:contract:layers]
; name = Layered architecture
; type = layers
; layers =
;     api
;     domain
;     infra

; Example forbidden import:
; [importlinter:contract:forbidden]
; name = Tests must not be imported by src
; type = forbidden
; source_modules =
;     agent_ready_python_starter
; forbidden_modules =
;     tests
